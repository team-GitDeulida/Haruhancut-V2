# Core VM
#   build-for-testing
#   test-without-building

# Data VM
#   build-for-testing
#   test-without-building

# App VM
#   build-for-testing
#   test-without-building

# build-and-test.yml
name: 하루한컷 Build & Test

on:
  workflow_dispatch:
    inputs:
      triggered_by_command:
        description: "Triggered by PR command"
        required: false
        default: "false"
      pr_number:
        description: "PR number"
        required: false

  schedule:
    # UTC 22:00 = KST 07:00
    - cron: "0 22 * * *"

  # PR 댓글 명령어로도 트리거 가능
  # issue_comment:
  #   types: [created]

  # PR이 열릴 때마다 실행 (main 브랜치 대상)
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

# Matrix Build + Test (병렬, VM 독립)
jobs:
  test:
    name: Test / ${{ matrix.module }}
    runs-on: macos-15

    strategy:
      fail-fast: false
      matrix:
        module: [Core, Data, App]

    steps:
      - uses: actions/checkout@v4

      - name: Create Shared.xcconfig
        run: |
          mkdir -p Projects/Shared/Configs
          cat << 'EOF' > Projects/Shared/Configs/Shared.xcconfig
          ${{ secrets.SHARED_XCCONFIG }}
          EOF

      - name: Select Xcode 16.4
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version

      # SwiftPM Cache
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      # Tuist Cache
      - name: Cache Tuist
        uses: actions/cache@v4
        with:
          path: |
            ~/.tuist/Dependencies
            ~/.tuist/Cache
            Tuist/Dependencies/.build
          key: tuist-${{ runner.os }}-${{ hashFiles('Tuist/Dependencies.swift') }}
          restore-keys: tuist-${{ runner.os }}-

      # DerivedData Cache
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: DerivedData
          key: deriveddata-${{ runner.os }}-xcode16.4-${{ matrix.module }}-${{ hashFiles('**/project.pbxproj') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-xcode16.4-${{ matrix.module }}-

      - name: Install Tuist
        run: |
          brew tap tuist/tuist
          brew install tuist@4.115.0

      - name: Generate Project
        run: |
          tuist install
          tuist generate --no-open

      # Simulator UUID Resolve
      - name: Resolve Simulator UUID
        run: |
          SIM_NAME="iPhone 16"
          SIM_OS="18.5"
          UDID=$(xcrun simctl list devices available | \
            grep "iOS ${SIM_OS}" -A 20 | \
            grep "^ *${SIM_NAME} (" | head -n 1 | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          if [ -z "$UDID" ]; then
            echo "Simulator not found"
            exit 1
          fi
          echo "SIM_UDID=$UDID" >> $GITHUB_ENV

      # 1. Build For Testing (VM 내부)
      - name: Build For Testing
        run: |
          xcodebuild build-for-testing \
            -workspace Haruhancut.xcworkspace \
            -scheme ${{ matrix.module }} \
            -configuration Debug \
            -destination "id=$SIM_UDID" \
            -derivedDataPath DerivedData

      # 2. Test Without Building (같은 DerivedData 사용)
      - name: Test Without Building
        run: |
          xcodebuild test-without-building \
            -workspace Haruhancut.xcworkspace \
            -scheme ${{ matrix.module }} \
            -configuration Debug \
            -destination "id=$SIM_UDID" \
            -derivedDataPath DerivedData

  # Notify
  notify:
    name: Notify Result
    runs-on: macos-15
    needs: test
    if: always()

    steps:
      - name: Comment success (PR only)
        if: needs.test.result == 'success' && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ✅ 하루한컷 패키지를 성공적으로 빌드하고 테스트했습니다.

      - name: Comment failure (PR only)
        if: needs.test.result != 'success' && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ❌ **하루한컷 iOS CI 실패**
            - 일부 모듈 테스트 실패

      # 메일은 모든 이벤트에서
      - name: Send email on success
        if: needs.test.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ✅ 하루한컷 iOS CI 성공
          body: |
            CI 성공 🎉

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Actor: ${{ github.actor }}
            URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: indextrown@gmail.com
          from: GitHub CI <${{ secrets.MAIL_USERNAME }}>

      - name: Send email on failure
        if: needs.test.result != 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ❌ 하루한컷 iOS CI 실패
          body: |
            CI 실패 발생 ❌

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Actor: ${{ github.actor }}
            URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: indextrown@gmail.com
          from: GitHub CI <${{ secrets.MAIL_USERNAME }}>
